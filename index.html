<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>구디 점메추</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=e6a5066c0e33bfb365feae38e3ef31f4&libraries=services"></script>
  <style>
    :root {
      --bg: #F2F4F6;
      --white: #FFFFFF;
      --blue: #3182F6;
      --blue-light: #EBF3FE;
      --blue-dark: #1B64DA;
      --text-primary: #191F28;
      --text-secondary: #4E5968;
      --text-tertiary: #8B95A1;
      --border: #E5E8EB;
      --payco: #F04452;
      --payco-bg: #FFF2F3;
      --green: #00C471;
      --green-bg: #EDFFF6;
      --surface: #FFFFFF;
      --r: 16px;
      --r-lg: 20px;
      --r-sm: 10px;
      --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
      --shadow: 0 2px 16px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      position: fixed; top:0; left:0; right:0; z-index:300;
      height: 60px;
      background: var(--white);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo-area { display:flex; align-items:center; gap:10px; }
    .logo-dot {
      width: 36px; height: 36px;
      background: var(--blue);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-title {
      font-size: 17px; font-weight: 700;
      color: var(--text-primary); letter-spacing: -0.5px;
    }
    .logo-sub {
      font-size: 11px; color: var(--text-tertiary);
      margin-top: 1px; font-weight: 400; letter-spacing: -0.2px;
    }

    /* PAYCO TOGGLE */
    .payco-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg); border: none;
      border-radius: 999px; padding: 7px 14px 7px 10px;
      cursor: pointer; transition: background 0.15s; user-select: none;
    }
    .payco-btn:hover { background: #E8ECF0; }
    .payco-btn.active { background: var(--payco-bg); }

    .sw-track {
      width: 34px; height: 20px;
      background: var(--border); border-radius: 999px;
      position: relative; transition: background 0.2s; flex-shrink:0;
    }
    .sw-track::after {
      content:''; position:absolute;
      width: 14px; height: 14px; background: white;
      border-radius: 50%; top: 3px; left: 3px;
      transition: left 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .payco-btn.active .sw-track { background: var(--payco); }
    .payco-btn.active .sw-track::after { left: 17px; }

    .payco-label {
      font-size: 13px; font-weight: 600;
      color: var(--text-secondary); letter-spacing: -0.3px;
    }
    .payco-btn.active .payco-label { color: var(--payco); }

    /* ── LAYOUT ── */
    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      height: 100vh;
      padding-top: 60px;
    }

    /* ── LEFT PANEL ── */
    .left {
      background: var(--bg);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* SEARCH */
    .search-zone {
      padding: 14px 14px 12px;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .search-row { display:flex; gap:8px; margin-bottom:12px; }

    .search-field {
      flex:1; display:flex; align-items:center; gap:8px;
      background: var(--bg); border-radius: 12px;
      padding: 0 14px; transition: all 0.15s;
      border: 1.5px solid transparent;
    }
    .search-field:focus-within {
      background: white;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(49,130,246,0.1);
    }
    .search-field input {
      flex:1; border:none; background:transparent;
      font-family: inherit; font-size: 14px;
      color: var(--text-primary); outline:none; padding: 10px 0;
      letter-spacing: -0.2px;
    }
    .search-field input::placeholder { color: var(--text-tertiary); }
    .search-field .si { color: var(--text-tertiary); font-size: 15px; }

    .search-go {
      background: var(--blue); color: white;
      border: none; border-radius: 12px;
      padding: 0 18px; height: 42px;
      font-family: inherit; font-size: 14px; font-weight: 700;
      cursor: pointer; letter-spacing: -0.3px;
      transition: background 0.15s;
    }
    .search-go:hover { background: var(--blue-dark); }
    .search-go:active { transform: scale(0.98); }

    /* CATEGORY CHIPS */
    .chips {
      display: flex; gap: 6px; overflow-x: auto;
      scrollbar-width: none;
    }
    .chips::-webkit-scrollbar { display: none; }

    .chip {
      background: var(--bg); border: 1.5px solid var(--border);
      color: var(--text-secondary); border-radius: 999px;
      padding: 6px 14px; font-size: 13px; font-weight: 500;
      font-family: inherit; cursor: pointer; white-space: nowrap;
      letter-spacing: -0.3px; transition: all 0.15s;
    }
    .chip:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }
    .chip.on { background: var(--blue); color: white; border-color: var(--blue); font-weight: 700; }

    /* RESULT BAR */
    .res-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .res-cnt { font-size: 13px; color: var(--text-tertiary); font-weight: 400; letter-spacing: -0.2px; }
    .res-cnt b { color: var(--blue); font-weight: 700; }

    .spin-wrap { display:none; align-items:center; gap:6px; font-size:12px; color:var(--text-tertiary); }
    .spin-wrap.on { display:flex; }
    .sp { width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin 0.6s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* CARDS */
    .card-list { flex:1; overflow-y:auto; padding:12px 12px 80px; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }

    .place-card {
      background: var(--white);
      border-radius: var(--r-lg);
      padding: 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.18s;
      box-shadow: var(--shadow-sm);
      border: 1.5px solid transparent;
    }
    .place-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
    .place-card.on { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(49,130,246,0.12), var(--shadow); }

    .pc-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
    .pc-name { font-size: 15px; font-weight: 700; letter-spacing:-0.4px; color:var(--text-primary); }
    .pc-cat { font-size: 12px; color: var(--text-tertiary); margin-top:2px; font-weight:400; letter-spacing:-0.2px; }
    .pc-rating { font-size: 13px; font-weight: 700; color: var(--blue); white-space:nowrap; }

    .pc-tags { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:7px; align-items:center; }
    .dist-tag {
      font-size: 12px; color: var(--text-tertiary);
      background: var(--bg); border-radius: 6px;
      padding: 2px 8px;
    }
    .payco-tag {
      background: var(--payco-bg); color: var(--payco);
      font-size: 11px; font-weight: 700; padding: 2px 8px;
      border-radius: 6px; letter-spacing: 0.2px;
    }
    .user-tag {
      background: var(--green-bg); color: var(--green);
      font-size: 11px; font-weight: 700; padding: 2px 8px;
      border-radius: 6px;
    }

    .pc-addr { font-size: 12px; color: var(--text-tertiary); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; letter-spacing:-0.2px; }
    .pc-review { margin-top:8px; padding:8px 10px; background:var(--bg); border-radius:10px; font-size:12px; color:var(--text-secondary); font-style:italic; overflow:hidden; display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; letter-spacing:-0.2px; }

    .empty { text-align:center; padding:64px 20px; color:var(--text-tertiary); }
    .empty-ico { font-size:44px; margin-bottom:12px; }
    .empty p { font-size:14px; }

    /* MAP */
    #map { width:100%; height:100%; }

    /* DRAWER */
    .drawer {
      position:fixed; bottom:0; left:380px; right:0;
      background: var(--white);
      border-top: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 0 24px 28px;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.32,0.72,0,1);
      z-index:200; max-height:60vh; overflow-y:auto;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.08);
    }
    .drawer.on { transform: translateY(0); }

    .d-handle-wrap { padding: 12px 0 4px; display:flex; justify-content:center; position:sticky; top:0; background:white; z-index:1; }
    .d-handle { width:36px; height:4px; background:var(--border); border-radius:2px; }

    .d-close-row { display:flex; justify-content:flex-end; margin-bottom:4px; }
    .d-close {
      width:28px; height:28px; border-radius:50%;
      background:var(--bg); border:none; cursor:pointer;
      font-size:13px; color:var(--text-tertiary);
      display:flex; align-items:center; justify-content:center;
      transition:background 0.15s; font-weight:700;
    }
    .d-close:hover { background:var(--border); }

    .d-name { font-size:22px; font-weight:800; letter-spacing:-0.6px; margin-bottom:4px; }
    .d-sub { font-size:13px; color:var(--text-tertiary); margin-bottom:14px; letter-spacing:-0.2px; }

    .d-stats { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
    .d-stat {
      background:var(--bg); border-radius:12px;
      padding:8px 14px; font-size:13px; color:var(--text-secondary);
      letter-spacing:-0.2px;
    }
    .d-stat label { font-size:11px; color:var(--text-tertiary); display:block; margin-bottom:2px; font-weight:500; }
    .d-big-rating { font-size:22px; font-weight:800; color:var(--blue); }
    .d-big-rating span { font-size:12px; color:var(--text-tertiary); font-weight:400; }

    /* PAYCO ROW */
    .payco-row {
      display:flex; align-items:center; justify-content:space-between;
      background:var(--bg); border-radius: var(--r);
      padding:14px 16px; margin-bottom:16px;
    }
    .pr-left { display:flex; align-items:center; gap:12px; }
    .pr-icon {
      width:40px; height:40px; border-radius:12px;
      background:var(--payco-bg); display:flex; align-items:center; justify-content:center;
      font-size:20px; flex-shrink:0;
    }
    .pr-title { font-size:14px; font-weight:700; letter-spacing:-0.3px; }
    .pr-desc { font-size:12px; color:var(--text-tertiary); margin-top:2px; letter-spacing:-0.2px; }

    .pr-toggle {
      width:48px; height:28px; background:var(--border);
      border-radius:999px; cursor:pointer;
      position:relative; transition:background 0.2s; flex-shrink:0;
      border:none;
    }
    .pr-toggle::after {
      content:''; position:absolute;
      width:20px; height:20px; background:white;
      border-radius:50%; top:4px; left:4px;
      transition:left 0.2s;
      box-shadow:0 1px 4px rgba(0,0,0,0.15);
    }
    .pr-toggle.on { background:var(--payco); }
    .pr-toggle.on::after { left:24px; }

    .brand-badge {
      background:var(--payco); color:white;
      font-size:12px; font-weight:700;
      padding:5px 12px; border-radius:8px; letter-spacing:-0.2px;
    }

    .naver-link {
      display:inline-flex; align-items:center; gap:6px;
      background:#03C75A; color:white; border:none;
      border-radius:10px; padding:9px 16px; font-size:13px;
      font-weight:700; font-family:inherit; cursor:pointer;
      text-decoration:none; margin-bottom:20px;
      letter-spacing:-0.3px; transition:opacity 0.15s;
    }
    .naver-link:hover { opacity:0.88; }

    .sec-label {
      font-size:13px; font-weight:700; color:var(--text-primary);
      letter-spacing:-0.3px; margin-bottom:10px;
    }

    /* REVIEWS */
    .rv-card { background:var(--bg); border-radius:12px; padding:12px 14px; margin-bottom:8px; }
    .rv-top { display:flex; justify-content:space-between; margin-bottom:4px; }
    .rv-who { font-size:13px; font-weight:700; letter-spacing:-0.3px; }
    .rv-when { font-size:11px; color:var(--text-tertiary); }
    .rv-stars { color:var(--blue); font-size:12px; margin-bottom:4px; }
    .rv-body { font-size:13px; color:var(--text-secondary); line-height:1.6; letter-spacing:-0.2px; }

    /* WRITE */
    .write-box {
      background:var(--bg); border-radius:var(--r);
      padding:16px; margin-top:12px;
    }
    .write-title { font-size:14px; font-weight:700; letter-spacing:-0.3px; margin-bottom:12px; }
    .write-row { display:flex; gap:8px; margin-bottom:10px; }
    .w-input, .w-ta {
      background:white; border:1.5px solid var(--border);
      border-radius:10px; color:var(--text-primary);
      font-family:inherit; font-size:13px;
      padding:9px 13px; outline:none;
      transition:border-color 0.15s, box-shadow 0.15s;
      letter-spacing:-0.2px;
    }
    .w-input:focus, .w-ta:focus {
      border-color:var(--blue);
      box-shadow:0 0 0 3px rgba(49,130,246,0.1);
    }
    .w-input { flex:1; }
    .w-ta { width:100%; height:68px; resize:none; display:block; margin-bottom:10px; }

    .star-pick { display:flex; gap:6px; margin-bottom:10px; }
    .star-pick span { font-size:22px; cursor:pointer; color:var(--border); transition:color 0.1s; }
    .star-pick span.on { color:#FFB800; }

    .w-submit {
      background:var(--blue); color:white; border:none;
      border-radius:10px; padding:10px 22px;
      font-family:inherit; font-size:13px; font-weight:700;
      cursor:pointer; transition:background 0.15s; letter-spacing:-0.3px;
    }
    .w-submit:hover { background:var(--blue-dark); }
    .w-submit:active { transform:scale(0.98); }

    /* ── 오늘의 추천 카드 ── */
    .rec-card {
      margin: 10px 10px 0;
      background: linear-gradient(135deg, #EBF3FE 0%, #F0F9FF 100%);
      border: 1.5px solid #B5D4F4;
      border-radius: var(--r-lg);
      padding: 14px 16px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .rec-card::before {
      content: '✨';
      position: absolute; right: 14px; top: 10px;
      font-size: 28px; opacity: 0.25;
    }
    .rec-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
      color: var(--blue); text-transform: uppercase; margin-bottom: 6px;
    }
    .rec-title {
      font-size: 14px; font-weight: 800; color: var(--text-primary);
      letter-spacing: -0.4px; margin-bottom: 5px; line-height: 1.4;
    }
    .rec-title em { color: var(--blue); font-style: normal; }
    .rec-reason {
      font-size: 12px; color: var(--text-secondary);
      letter-spacing: -0.2px; line-height: 1.5;
    }
    .rec-bottom {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 10px;
    }
    .rec-refresh {
      background: white; border: 1.5px solid var(--border);
      border-radius: 999px; padding: 5px 12px;
      font-family: inherit; font-size: 11px; font-weight: 700;
      color: var(--text-secondary); cursor: pointer;
      transition: all 0.15s; letter-spacing: -0.2px;
    }
    .rec-refresh:hover { border-color: var(--blue); color: var(--blue); }
    .rec-loading {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-tertiary);
    }

    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

    @media (max-width:768px) {
      .layout { grid-template-columns:1fr; grid-template-rows:45vh 1fr; }
      .drawer { left:0; max-height:75vh; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-area">
    <div class="logo-dot" style="font-size:20px;">😋</div>
    <div>
      <div class="logo-title">구디 점메추</div>
      <div class="logo-sub">NHN KCP 주변 점심 메뉴 추천</div>
    </div>
  </div>
  <button class="payco-btn" id="paycoBtn">
    <div class="sw-track"></div>
    <span class="payco-label">PAYCO 식권만</span>
  </button>
</header>

<div class="layout">
  <div class="left">
    <div class="search-zone">
      <div class="search-row">
        <div class="search-field">
          <span class="si">🔍</span>
          <input id="sInput" type="text" placeholder="가게명, 메뉴 검색" />
        </div>
        <button class="search-go" onclick="doSearch()">검색</button>
      </div>
      <div style="position:relative;display:flex;align-items:center;gap:4px;">
        <button onclick="scrollChips(-1)" style="
          flex-shrink:0;width:28px;height:28px;border-radius:50%;
          background:white;border:1.5px solid var(--border);
          font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;
          box-shadow:var(--shadow-sm);transition:all 0.15s;
        ">‹</button>
        <div class="chips" id="chipsWrap">
          <button class="chip on" data-cat="FD6" data-kw="false">전체 음식점</button>
          <button class="chip" data-cat="CE7" data-kw="false">☕ 카페</button>
          <button class="chip" data-cat="한식" data-kw="true">🍚 한식</button>
          <button class="chip" data-cat="일식" data-kw="true">🍱 일식</button>
          <button class="chip" data-cat="중식" data-kw="true">🥢 중식</button>
          <button class="chip" data-cat="양식" data-kw="true">🍝 양식</button>
          <button class="chip" data-cat="분식" data-kw="true">🍜 분식</button>
          <button class="chip" data-cat="고기" data-kw="true">🥩 고기</button>
        </div>
        <button onclick="scrollChips(1)" style="
          flex-shrink:0;width:28px;height:28px;border-radius:50%;
          background:white;border:1.5px solid var(--border);
          font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;
          box-shadow:var(--shadow-sm);transition:all 0.15s;
        ">›</button>
      </div>
    </div>
    <!-- 오늘의 추천 카드 -->
    <div class="rec-card" id="recCard">
      <div class="rec-label">🎲 오늘의 점메추</div>
      <div class="rec-loading" id="recLoading"><div class="sp"></div><span>추천 메뉴 고르는 중...</span></div>
      <div id="recContent" style="display:none;">
        <div class="rec-title" id="recTitle"></div>
        <div class="rec-reason" id="recReason"></div>
        <div class="rec-bottom">
          <span style="font-size:11px;color:var(--text-tertiary);">AI 추천</span>
          <button class="rec-refresh" onclick="getRecommendation()">🔀 다시 추천</button>
        </div>
      </div>
    </div>
    <div class="res-bar">
      <span class="res-cnt" id="rCnt">불러오는 중...</span>
      <div class="spin-wrap" id="spinner"><div class="sp"></div><span>검색 중</span></div>
    </div>
    <div class="card-list" id="cardList"></div>
  </div>

  <div style="position:relative;overflow:hidden;height:100%;">
    <div id="map" style="width:100%;height:100%;"></div>
    <!-- 현 지도에서 검색 버튼 -->
    <div id="reSearchBtn" style="
      display:none;
      position:absolute;
      top:16px;
      left:50%;
      transform:translateX(-50%);
      z-index:100;
    ">
      <button onclick="reSearchHere()" style="
        background:white;
        border:1.5px solid var(--border);
        border-radius:999px;
        padding:10px 20px;
        font-family:'Noto Sans KR',sans-serif;
        font-size:13px;
        font-weight:700;
        color:var(--text-primary);
        cursor:pointer;
        box-shadow:0 2px 12px rgba(0,0,0,0.12);
        display:flex;align-items:center;gap:6px;
        white-space:nowrap;
        transition:all 0.15s;
      " onmouseover="this.style.background='#3182F6';this.style.color='white';this.style.borderColor='#3182F6';"
         onmouseout="this.style.background='white';this.style.color='var(--text-primary)';this.style.borderColor='var(--border)';">
        🔍 현 지도에서 검색
      </button>
    </div>
    <div class="drawer" id="drawer">
      <div class="d-handle-wrap"><div class="d-handle"></div></div>
      <div id="dContent"></div>
    </div>
  </div>
</div>

<script>
const NHN_ADDR = "서울특별시 구로구 디지털로26길 72";
// NHN KCP 정확한 좌표 (구글맵 확인)
let CX = 37.4808, CY = 126.8937;

const PK="gdpm_payco_v1", RK="gdpm_rv_v1";
const lsG=k=>{try{return JSON.parse(localStorage.getItem(k)||"{}")}catch{return{}}};
const lsS=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};
let uPayco=lsG(PK), uRevs=lsG(RK);
const isPayco=p=>uPayco[p.id]===true;

let map,ps,ovs=[],places=[],filtered=[],sel=null,star=0,pOn=false,cat="FD6",kw=false,busy=false;

let lastCenter = null;

window.onload=function(){
  if(typeof kakao === 'undefined' || typeof kakao.maps === 'undefined') {
    setTimeout(window.onload, 200); return;
  }
  map=new kakao.maps.Map(document.getElementById("map"),{center:new kakao.maps.LatLng(CX,CY),level:4});
  ps=new kakao.maps.services.Places();

  lastCenter = new kakao.maps.LatLng(CX, CY);
  load();

  // 드래그하면 바로 버튼 표시
  kakao.maps.event.addListener(map, 'dragstart', function() {
    document.getElementById("reSearchBtn").style.display = "block";
  });

  // 지도 클릭 시 해당 위치 근처 장소 검색해서 드로어 표시
  kakao.maps.event.addListener(map, 'click', function(mouseEvent) {
    const latlng = mouseEvent.latLng;
    const clickPs = new kakao.maps.services.Places();

    function findClosest(data) {
      let closest = null, minDist = Infinity;
      data.forEach(p => {
        const dx = parseFloat(p.x) - latlng.getLng();
        const dy = parseFloat(p.y) - latlng.getLat();
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < minDist) { minDist = d; closest = p; }
      });
      return minDist < 0.0005 ? closest : null;
    }

    // 음식점 먼저 검색
    clickPs.categorySearch('FD6', function(data1, status1) {
      const found1 = status1 === kakao.maps.services.Status.OK ? findClosest(data1) : null;
      // 카페도 검색
      clickPs.categorySearch('CE7', function(data2, status2) {
        const found2 = status2 === kakao.maps.services.Status.OK ? findClosest(data2) : null;
        const found = found1 || found2;
        if (found) {
          sel = found;
          openDrawer(found);
          map.panTo(new kakao.maps.LatLng(found.y, found.x));
        }
      }, { location: latlng, radius: 50, sort: kakao.maps.services.SortBy.DISTANCE });
    }, { location: latlng, radius: 50, sort: kakao.maps.services.SortBy.DISTANCE });
  });
};

// ── 오늘의 추천 ──
const REC_KEY = "gdpm_rec_v1";

async function getRecommendation() {
  document.getElementById("recLoading").style.display = "flex";
  document.getElementById("recContent").style.display = "none";

  // 카페 제외하고 음식점만 추천
  const foodPool = places.filter(p => {
    const cat = p.category_name || "";
    return !cat.includes("카페") && !cat.includes("커피") && !cat.includes("베이커리");
  });
  const pool = foodPool.length > 0 ? foodPool : places;

  if (pool.length === 0) {
    document.getElementById("recLoading").style.display = "none";
    document.getElementById("recContent").style.display = "block";
    document.getElementById("recTitle").innerHTML = `식당을 불러오는 중이에요! 잠시 후 다시 눌러주세요 😊`;
    document.getElementById("recReason").textContent = "";
    return;
  }

  const picked = pool[Math.floor(Math.random() * pool.length)];
  const dist = picked.distance ? `${picked.distance}m` : "근처";
  const cat = picked.category_name ? picked.category_name.split(">").pop().trim() : "";

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 150,
        messages: [{
          role: "user",
          content: `너는 귀엽고 친근한 점심 추천 AI야.
오늘 추천할 식당: "${picked.place_name}" (${cat}, ${dist} 거리)

아래 형식으로만 답해줘 (JSON, 다른 말 없이):
{
  "reason": "귀엽고 짧은 추천 이유 1~2문장. 이모지 꼭 포함. 직장인 점심 감성으로."
}

예시:
{"reason": "맛있는 점심 먹고 오후에 힘내는 거에요! 오늘도 화이팅 💪😋"}`
        }]
      })
    });
    const data = await res.json();
    const text = data.content[0].text;
    const json = JSON.parse(text.replace(/```json|```/g,"").trim());

    document.getElementById("recTitle").innerHTML =
      `오늘은 <em>'${picked.place_name}'</em> 어떠세요?`;
    document.getElementById("recReason").textContent = json.reason;

  } catch(e) {
    const fallbacks = [
      `맛있는 점심 먹고 오후에 힘내는 거예요! 💪😋`,
      `오늘 이거 안 가면 후회할 것 같은 느낌적인 느낌...! 🍽️✨`,
      `점심은 하루의 반환점! 맛있게 먹고 오후도 달려봐요 🏃‍♀️💨`,
      `AI가 엄선한 오늘의 추천! 믿고 따라가요 😎🎯`,
      `배고플 땐 생각이 안 나잖아요. 일단 가요! 🚶‍♂️💨`,
    ];
    document.getElementById("recTitle").innerHTML =
      `오늘은 <em>'${picked.place_name}'</em> 어떠세요?`;
    document.getElementById("recReason").textContent =
      fallbacks[Math.floor(Math.random() * fallbacks.length)];
  }

  document.getElementById("recLoading").style.display = "none";
  document.getElementById("recContent").style.display = "block";
}

// 자동 닉네임 생성
const NICKNAMES = ["구디직장인","점심헌터","밥심충전","배고픈곰","점메추왕","식신","맛집탐정","밥순이","밥돌이","구로미식가","점심요정","배부른돼지","맛있어요","냠냠이","구디밥집"];
function autoNick() {
  return NICKNAMES[Math.floor(Math.random()*NICKNAMES.length)] + Math.floor(Math.random()*99+1);
}
function reSearchHere(){
  document.getElementById("reSearchBtn").style.display = "none";
  const center = map.getCenter();
  CX = center.getLat();
  CY = center.getLng();
  lastCenter = center;
  closeDrawer();
  load();
}

function load(){
  if(busy)return;
  busy=true;spin(true);places=[];clearOv();
  const loc=new kakao.maps.LatLng(CX,CY);
  let pg=1;
  function next(){
    const opts={location:loc,radius:1500,sort:kakao.maps.services.SortBy.DISTANCE,page:pg};
    const cb=(data,status,pag)=>{
      if(status===kakao.maps.services.Status.OK){
        places=places.concat(data);
        if(pag.hasNextPage){pg++;pag.nextPage();}else done();
      }else done();
    };
    kw?ps.keywordSearch(cat+" 구로디지털단지",cb,opts):ps.categorySearch(cat,cb,opts);
  }
  next();
  function done(){
    const seen=new Set();
    places=places.filter(p=>{if(seen.has(p.id))return false;seen.add(p.id);return true;});
    busy=false;filter();spin(false);
    // 첫 로드 시에만 추천 실행
    if(document.getElementById("recContent").style.display !== "block") {
      getRecommendation();
    }
  }
}

function filter(){
  filtered=places.filter(p=>!pOn||isPayco(p));
  renderCards();renderOv();
  document.getElementById("rCnt").innerHTML=`<b>${filtered.length}</b>개 장소${pOn?" · PAYCO":""}`;
}

function spin(v){document.getElementById("spinner").classList.toggle("on",v);}

function renderCards(){
  const el=document.getElementById("cardList");
  if(!filtered.length){el.innerHTML=`<div class="empty"><div class="empty-ico">🍽️</div><p>조건에 맞는 장소가 없어요</p></div>`;return;}
  el.innerHTML=filtered.map(p=>{
    const pay=isPayco(p);
    const rv=uRevs[p.id]||[],avg=rv.length?(rv.reduce((s,r)=>s+r.star,0)/rv.length).toFixed(1):null;
    const c=p.category_name?p.category_name.split(">").pop().trim():"";
    const d=p.distance?`${p.distance}m`:"";
    const last=rv.length?rv[rv.length-1].text:"";
    const active=sel&&sel.id===p.id?"on":"";
    return`<div class="place-card ${active}" onclick="pick('${p.id}')" id="c-${p.id}">
      <div class="pc-top">
        <div style="flex:1;min-width:0;"><div class="pc-name">${p.place_name}</div><div class="pc-cat">${c}</div></div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;margin-left:8px;">
          ${avg?`<div class="pc-rating">★ ${avg}</div>`:""}
          ${pay?`<span class="payco-tag">PAYCO</span>`:""}
        </div>
      </div>
      <div class="pc-tags">${d?`<span class="dist-tag">📍 ${d}</span>`:""}</div>
      <div class="pc-addr">${p.road_address_name||p.address_name||""}</div>
      ${last?`<div class="pc-review">"${last}"</div>`:""}
    </div>`;
  }).join("");
}

function clearOv(){ovs.forEach(o=>o.setMap(null));ovs=[];}

function renderOv(){
  clearOv();
  filtered.forEach(p=>{
    const pay=isPayco(p),cafe=p.category_name&&p.category_name.includes("카페");
    const bg=pay?"#F04452":cafe?"#8B5E3C":"#3182F6";
    const o=new kakao.maps.CustomOverlay({
      position:new kakao.maps.LatLng(p.y,p.x),
      content:`<div onclick="pick('${p.id}')" style="background:${bg};color:white;border-radius:999px;padding:5px 12px;font-size:11px;font-weight:700;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.18);letter-spacing:-0.2px;">${cafe?"☕":"🍽"} ${p.place_name}</div>`,
      yAnchor:1.4
    });
    o.setMap(map);ovs.push(o);
  });
}

function pick(id){
  const p=filtered.find(x=>x.id===id);if(!p)return;
  sel=p;
  document.querySelectorAll(".place-card").forEach(c=>c.classList.remove("on"));
  const card=document.getElementById(`c-${id}`);
  if(card){card.classList.add("on");card.scrollIntoView({behavior:"smooth",block:"nearest"});}
  map.panTo(new kakao.maps.LatLng(p.y,p.x));
  openDrawer(p);
}

function openDrawer(p){
  star=0;
  const c=p.category_name?p.category_name.split(">").pop().trim():"";
  const rv=uRevs[p.id]||[];
  const avg=rv.length?(rv.reduce((s,r)=>s+r.star,0)/rv.length).toFixed(1):null;
  const d=p.distance?`${p.distance}m`:"-";
  const addr=p.road_address_name||p.address_name||"";
  const pOn2=uPayco[p.id]===true;

  const rvHtml=rv.map(r=>`
    <div class="rv-card">
      <div class="rv-top"><span class="rv-who">👤 ${r.author}</span><span class="rv-when">${r.date}</span></div>
      <div class="rv-stars">${"★".repeat(r.star)}${"☆".repeat(5-r.star)}</div>
      <div class="rv-body">${r.text}</div>
    </div>`).join("");

  document.getElementById("dContent").innerHTML=`
    <div class="d-close-row"><button class="d-close" onclick="closeDrawer()">✕</button></div>
    <div class="d-name">${p.place_name}</div>
    <div class="d-sub">${c}${addr?" · "+addr:""}</div>
    <div class="d-stats">
      ${avg?`<div class="d-big-rating">★${avg} <span>/ 5.0 (${rv.length}건)</span></div>`:`<span style="color:var(--text-tertiary);font-size:13px;">리뷰가 없어요</span>`}
      <div class="d-stat"><label>거리</label>${d}</div>
      ${p.phone?`<div class="d-stat"><label>전화</label>${p.phone}</div>`:""}
    </div>
    <div class="payco-row">
      <div class="pr-left">
        <div class="pr-icon">💳</div>
        <div>
          <div class="pr-title">PAYCO 식권 가능</div>
          <div class="pr-desc">직접 체크해서 공유해요</div>
        </div>
      </div>
      <button class="pr-toggle ${pOn2?"on":""}" id="pToggle" onclick="tPayco('${p.id}')"></button>
    </div>
    <div style="margin-bottom:14px;">
      <div style="font-size:12px;color:var(--text-tertiary);margin-bottom:8px;font-weight:500;">🍽 메뉴 · 가격 · 사진은 네이버 지도에서 확인하세요</div>
      <a class="naver-link" href="https://map.naver.com/v5/search/${encodeURIComponent(p.place_name + ' ' + (p.road_address_name||''))}" target="_blank">🗺 네이버 지도에서 메뉴 보기 →</a>
    </div>
    <div class="sec-label">구디 점메추 리뷰 ${rv.length}개</div>
    <div>${rvHtml||`<div style="color:var(--text-tertiary);font-size:13px;padding:4px 0 10px;">첫 번째 리뷰를 남겨보세요!</div>`}</div>
    <div class="write-box">
      <div class="write-title">✍️ 리뷰 남기기</div>
      <div class="star-pick" id="sPick">
        <span onclick="setStar(1)">★</span><span onclick="setStar(2)">★</span><span onclick="setStar(3)">★</span><span onclick="setStar(4)">★</span><span onclick="setStar(5)">★</span>
      </div>
      <textarea class="w-ta" id="wText" placeholder="솔직한 한마디를 남겨주세요 (최대 200자)" maxlength="200"></textarea>
      <button class="w-submit" onclick="submitRv('${p.id}')">등록하기</button>
    </div>`;

  document.getElementById("drawer").classList.add("on");
}

function closeDrawer(){
  document.getElementById("drawer").classList.remove("on");
  sel=null;document.querySelectorAll(".place-card").forEach(c=>c.classList.remove("on"));
}

function tPayco(pid){
  uPayco[pid]=!uPayco[pid];lsS(PK,uPayco);
  const t=document.getElementById("pToggle");if(t)t.classList.toggle("on",uPayco[pid]);
  renderCards();renderOv();
}

function setStar(n){
  star=n;
  document.querySelectorAll("#sPick span").forEach((s,i)=>s.classList.toggle("on",i<n));
}

function submitRv(pid){
  const name = autoNick();
  const text=document.getElementById("wText").value.trim();
  if(!text){alert("리뷰를 입력해주세요!");return;}
  if(!star){alert("별점을 선택해주세요!");return;}
  if(!uRevs[pid])uRevs[pid]=[];
  const now=new Date();
  uRevs[pid].push({author:name,star,text,date:`${now.getMonth()+1}/${now.getDate()}`});
  lsS(RK,uRevs);
  const p=filtered.find(x=>x.id===pid);if(p)openDrawer(p);
  renderCards();
}

function doSearch(){
  const q=document.getElementById("sInput").value.trim();
  if(!q){load();return;}
  if(busy)return;
  busy=true;spin(true);places=[];clearOv();
  const loc=new kakao.maps.LatLng(CX,CY);let pg=1;
  function next(){
    ps.keywordSearch(q,(data,status,pag)=>{
      if(status===kakao.maps.services.Status.OK){
        places=places.concat(data);
        if(pag.hasNextPage){pg++;pag.nextPage();}
        else{busy=false;filter();spin(false);}
      }else{busy=false;filter();spin(false);}
    },{location:loc,radius:1500,sort:kakao.maps.services.SortBy.DISTANCE,page:pg});
  }
  next();
}

document.getElementById("sInput").addEventListener("keydown",e=>{if(e.key==="Enter")doSearch();});

document.getElementById("paycoBtn").addEventListener("click",function(){
  pOn=!pOn;this.classList.toggle("active",pOn);filter();closeDrawer();
});

function scrollChips(dir){
  const el = document.getElementById("chipsWrap");
  el.scrollBy({ left: dir * 120, behavior: "smooth" });
}

document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll(".chip").forEach(b=>{
    b.addEventListener("click",function(){
      if(busy)return;
      document.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));
      this.classList.add("on");
      cat=this.dataset.cat;kw=this.dataset.kw==="true";
      document.getElementById("sInput").value="";
      closeDrawer();load();
    });
  });
});
</script>
</body>
</html>
