<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>구디 점메추</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=e6a5066c0e33bfb365feae38e3ef31f4&libraries=services"></script>
  <style>
    :root {
      --bg: #F2F4F6;
      --white: #FFFFFF;
      --blue: #3182F6;
      --blue-light: #EBF3FE;
      --blue-dark: #1B64DA;
      --text-primary: #191F28;
      --text-secondary: #4E5968;
      --text-tertiary: #8B95A1;
      --border: #E5E8EB;
      --payco: #F04452;
      --payco-bg: #FFF2F3;
      --green: #00C471;
      --green-bg: #EDFFF6;
      --surface: #FFFFFF;
      --r: 16px;
      --r-lg: 20px;
      --r-sm: 10px;
      --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
      --shadow: 0 2px 16px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      position: fixed; top:0; left:0; right:0; z-index:300;
      height: 60px;
      background: var(--white);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo-area { display:flex; align-items:center; gap:10px; }
    .logo-dot {
      width: 36px; height: 36px;
      background: var(--blue);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-title {
      font-size: 17px; font-weight: 700;
      color: var(--text-primary); letter-spacing: -0.5px;
    }
    .logo-sub {
      font-size: 11px; color: var(--text-tertiary);
      margin-top: 1px; font-weight: 400; letter-spacing: -0.2px;
    }

    /* PAYCO TOGGLE */
    .payco-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg); border: none;
      border-radius: 999px; padding: 7px 14px 7px 10px;
      cursor: pointer; transition: background 0.15s; user-select: none;
    }
    .payco-btn:hover { background: #E8ECF0; }
    .payco-btn.active { background: var(--payco-bg); }

    .sw-track {
      width: 34px; height: 20px;
      background: var(--border); border-radius: 999px;
      position: relative; transition: background 0.2s; flex-shrink:0;
    }
    .sw-track::after {
      content:''; position:absolute;
      width: 14px; height: 14px; background: white;
      border-radius: 50%; top: 3px; left: 3px;
      transition: left 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .payco-btn.active .sw-track { background: var(--payco); }
    .payco-btn.active .sw-track::after { left: 17px; }

    .payco-label {
      font-size: 13px; font-weight: 600;
      color: var(--text-secondary); letter-spacing: -0.3px;
    }
    .payco-btn.active .payco-label { color: var(--payco); }

    /* ── LAYOUT ── */
    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      height: 100vh;
      padding-top: 60px;
    }

    /* ── LEFT PANEL ── */
    .left {
      background: var(--bg);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* SEARCH */
    .search-zone {
      padding: 14px 14px 12px;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .search-row { display:flex; gap:8px; margin-bottom:12px; }

    .search-field {
      flex:1; display:flex; align-items:center; gap:8px;
      background: var(--bg); border-radius: 12px;
      padding: 0 14px; transition: all 0.15s;
      border: 1.5px solid transparent;
    }
    .search-field:focus-within {
      background: white;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(49,130,246,0.1);
    }
    .search-field input {
      flex:1; border:none; background:transparent;
      font-family: inherit; font-size: 14px;
      color: var(--text-primary); outline:none; padding: 10px 0;
      letter-spacing: -0.2px;
    }
    .search-field input::placeholder { color: var(--text-tertiary); }
    .search-field .si { color: var(--text-tertiary); font-size: 15px; }

    .search-go {
      background: var(--blue); color: white;
      border: none; border-radius: 12px;
      padding: 0 18px; height: 42px;
      font-family: inherit; font-size: 14px; font-weight: 700;
      cursor: pointer; letter-spacing: -0.3px;
      transition: background 0.15s;
    }
    .search-go:hover { background: var(--blue-dark); }
    .search-go:active { transform: scale(0.98); }

    /* CATEGORY CHIPS */
    .chips {
      display: flex; gap: 6px; overflow-x: auto;
      scrollbar-width: none;
    }
    .chips::-webkit-scrollbar { display: none; }

    .chip {
      background: var(--bg); border: 1.5px solid var(--border);
      color: var(--text-secondary); border-radius: 999px;
      padding: 6px 14px; font-size: 13px; font-weight: 500;
      font-family: inherit; cursor: pointer; white-space: nowrap;
      letter-spacing: -0.3px; transition: all 0.15s;
    }
    .chip:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }
    .chip.on { background: var(--blue); color: white; border-color: var(--blue); font-weight: 700; }

    /* RESULT BAR */
    .res-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .res-cnt { font-size: 13px; color: var(--text-tertiary); font-weight: 400; letter-spacing: -0.2px; }
    .res-cnt b { color: var(--blue); font-weight: 700; }

    .spin-wrap { display:none; align-items:center; gap:6px; font-size:12px; color:var(--text-tertiary); }
    .spin-wrap.on { display:flex; }
    .sp { width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin 0.6s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* CARDS */
    .card-list { flex:1; overflow-y:auto; padding:12px 12px 80px; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }

    .place-card {
      background: var(--white);
      border-radius: var(--r-lg);
      padding: 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.18s;
      box-shadow: var(--shadow-sm);
      border: 1.5px solid transparent;
    }
    .place-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
    .place-card.on { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(49,130,246,0.12), var(--shadow); }

    .pc-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
    .pc-name { font-size: 15px; font-weight: 700; letter-spacing:-0.4px; color:var(--text-primary); }
    .pc-cat { font-size: 12px; color: var(--text-tertiary); margin-top:2px; font-weight:400; letter-spacing:-0.2px; }
    .pc-rating { font-size: 13px; font-weight: 700; color: var(--blue); white-space:nowrap; }

    .pc-tags { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:7px; align-items:center; }
    .dist-tag {
      font-size: 12px; color: var(--text-tertiary);
      background: var(--bg); border-radius: 6px;
      padding: 2px 8px;
    }
    .payco-tag {
      background: var(--payco-bg); color: var(--payco);
      font-size: 11px; font-weight: 700; padding: 2px 8px;
      border-radius: 6px; letter-spacing: 0.2px;
    }
    .user-tag {
      background: var(--green-bg); color: var(--green);
      font-size: 11px; font-weight: 700; padding: 2px 8px;
      border-radius: 6px;
    }

    .pc-addr { font-size: 12px; color: var(--text-tertiary); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; letter-spacing:-0.2px; }
    .pc-review { margin-top:8px; padding:8px 10px; background:var(--bg); border-radius:10px; font-size:12px; color:var(--text-secondary); font-style:italic; overflow:hidden; display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; letter-spacing:-0.2px; }

    .empty { text-align:center; padding:64px 20px; color:var(--text-tertiary); }
    .empty-ico { font-size:44px; margin-bottom:12px; }
    .empty p { font-size:14px; }

    /* MAP */
    #map { width:100%; height:100%; }

    /* DRAWER */
    .drawer {
      position:fixed; bottom:0; left:380px; right:0;
      background: var(--white);
      border-top: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 0 24px 28px;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.32,0.72,0,1);
      z-index:200; max-height:60vh; overflow-y:auto;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.08);
    }
    .drawer.on { transform: translateY(0); }

    .d-handle-wrap { padding: 12px 0 4px; display:flex; justify-content:center; position:sticky; top:0; background:white; z-index:1; }
    .d-handle { width:36px; height:4px; background:var(--border); border-radius:2px; }

    .d-close-row { display:flex; justify-content:flex-end; margin-bottom:4px; }
    .d-close {
      width:28px; height:28px; border-radius:50%;
      background:var(--bg); border:none; cursor:pointer;
      font-size:13px; color:var(--text-tertiary);
      display:flex; align-items:center; justify-content:center;
      transition:background 0.15s; font-weight:700;
    }
    .d-close:hover { background:var(--border); }

    .d-name { font-size:22px; font-weight:800; letter-spacing:-0.6px; margin-bottom:4px; }
    .d-sub { font-size:13px; color:var(--text-tertiary); margin-bottom:14px; letter-spacing:-0.2px; }

    .d-stats { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
    .d-stat {
      background:var(--bg); border-radius:12px;
      padding:8px 14px; font-size:13px; color:var(--text-secondary);
      letter-spacing:-0.2px;
    }
    .d-stat label { font-size:11px; color:var(--text-tertiary); display:block; margin-bottom:2px; font-weight:500; }
    .d-big-rating { font-size:22px; font-weight:800; color:var(--blue); }
    .d-big-rating span { font-size:12px; color:var(--text-tertiary); font-weight:400; }

    /* PAYCO ROW */
    .payco-row {
      display:flex; align-items:center; justify-content:space-between;
      background:var(--bg); border-radius: var(--r);
      padding:14px 16px; margin-bottom:16px;
    }
    .pr-left { display:flex; align-items:center; gap:12px; }
    .pr-icon {
      width:40px; height:40px; border-radius:12px;
      background:var(--payco-bg); display:flex; align-items:center; justify-content:center;
      font-size:20px; flex-shrink:0;
    }
    .pr-title { font-size:14px; font-weight:700; letter-spacing:-0.3px; }
    .pr-desc { font-size:12px; color:var(--text-tertiary); margin-top:2px; letter-spacing:-0.2px; }

    .pr-toggle {
      width:48px; height:28px; background:var(--border);
      border-radius:999px; cursor:pointer;
      position:relative; transition:background 0.2s; flex-shrink:0;
      border:none;
    }
    .pr-toggle::after {
      content:''; position:absolute;
      width:20px; height:20px; background:white;
      border-radius:50%; top:4px; left:4px;
      transition:left 0.2s;
      box-shadow:0 1px 4px rgba(0,0,0,0.15);
    }
    .pr-toggle.on { background:var(--payco); }
    .pr-toggle.on::after { left:24px; }

    .brand-badge {
      background:var(--payco); color:white;
      font-size:12px; font-weight:700;
      padding:5px 12px; border-radius:8px; letter-spacing:-0.2px;
    }

    .naver-link {
      display:inline-flex; align-items:center; gap:6px;
      background:#03C75A; color:white; border:none;
      border-radius:10px; padding:9px 16px; font-size:13px;
      font-weight:700; font-family:inherit; cursor:pointer;
      text-decoration:none; margin-bottom:20px;
      letter-spacing:-0.3px; transition:opacity 0.15s;
    }
    .naver-link:hover { opacity:0.88; }

    .sec-label {
      font-size:13px; font-weight:700; color:var(--text-primary);
      letter-spacing:-0.3px; margin-bottom:10px;
    }

    /* REVIEWS */
    .rv-card { background:var(--bg); border-radius:12px; padding:12px 14px; margin-bottom:8px; }
    .rv-top { display:flex; justify-content:space-between; margin-bottom:4px; }
    .rv-who { font-size:13px; font-weight:700; letter-spacing:-0.3px; }
    .rv-when { font-size:11px; color:var(--text-tertiary); }
    .rv-stars { color:var(--blue); font-size:12px; margin-bottom:4px; }
    .rv-body { font-size:13px; color:var(--text-secondary); line-height:1.6; letter-spacing:-0.2px; }

    /* WRITE */
    .write-box {
      background:var(--bg); border-radius:var(--r);
      padding:16px; margin-top:12px;
    }
    .write-title { font-size:14px; font-weight:700; letter-spacing:-0.3px; margin-bottom:12px; }
    .write-row { display:flex; gap:8px; margin-bottom:10px; }
    .w-input, .w-ta {
      background:white; border:1.5px solid var(--border);
      border-radius:10px; color:var(--text-primary);
      font-family:inherit; font-size:13px;
      padding:9px 13px; outline:none;
      transition:border-color 0.15s, box-shadow 0.15s;
      letter-spacing:-0.2px;
    }
    .w-input:focus, .w-ta:focus {
      border-color:var(--blue);
      box-shadow:0 0 0 3px rgba(49,130,246,0.1);
    }
    .w-input { flex:1; }
    .w-ta { width:100%; height:68px; resize:none; display:block; margin-bottom:10px; }

    .star-pick { display:flex; gap:6px; margin-bottom:10px; }
    .star-pick span { font-size:22px; cursor:pointer; color:var(--border); transition:color 0.1s; }
    .star-pick span.on { color:#FFB800; }

    .w-submit {
      background:var(--blue); color:white; border:none;
      border-radius:10px; padding:10px 22px;
      font-family:inherit; font-size:13px; font-weight:700;
      cursor:pointer; transition:background 0.15s; letter-spacing:-0.3px;
    }
    .w-submit:hover { background:var(--blue-dark); }
    .w-submit:active { transform:scale(0.98); }

    /* ── 오늘의 추천 카드 ── */
    .rec-card {
      margin: 10px 10px 0;
      background: linear-gradient(135deg, #EBF3FE 0%, #F0F9FF 100%);
      border: 1.5px solid #B5D4F4;
      border-radius: var(--r-lg);
      padding: 14px 16px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .rec-card::before {
      content: '✨';
      position: absolute; right: 14px; top: 10px;
      font-size: 28px; opacity: 0.25;
    }
    .rec-label {
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
      color: var(--blue); text-transform: uppercase; margin-bottom: 6px;
    }
    .rec-title {
      font-size: 14px; font-weight: 800; color: var(--text-primary);
      letter-spacing: -0.4px; margin-bottom: 5px; line-height: 1.4;
    }
    .rec-title em { color: var(--blue); font-style: normal; }
    .rec-reason {
      font-size: 12px; color: var(--text-secondary);
      letter-spacing: -0.2px; line-height: 1.5;
    }
    .rec-bottom {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 10px;
    }
    .rec-refresh {
      background: white; border: 1.5px solid var(--border);
      border-radius: 999px; padding: 5px 12px;
      font-family: inherit; font-size: 11px; font-weight: 700;
      color: var(--text-secondary); cursor: pointer;
      transition: all 0.15s; letter-spacing: -0.2px;
    }
    .rec-refresh:hover { border-color: var(--blue); color: var(--blue); }
    .rec-loading {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-tertiary);
    }

    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

    /* ── 모바일 전용 요소 기본 숨김 ── */
    #mobHeader, #mobChipBar, #mobPanelDim, #mobPanel, #mobRecFloat { display: none; }

    @media (max-width:768px) {
      /* PC 요소 숨김 */
      header { display: none !important; }
      .left   { display: none !important; }

      /* 지도 레이아웃 풀스크린 */
      .layout {
        position: fixed !important;
        top: 92px !important; left: 0 !important; right: 0 !important; bottom: 0 !important;
        display: block !important; height: auto !important;
      }
      .layout > div:last-child {
        position: absolute !important; inset: 0 !important;
        height: 100% !important; overflow: hidden !important;
      }
      #map { width: 100% !important; height: 100% !important; }
      #reSearchBtn { z-index: 200 !important; }

      /* 모바일 요소 표시 */
      #mobHeader {
        display: flex !important;
        position: fixed; top: 0; left: 0; right: 0; height: 50px; z-index: 600;
        background: var(--white); border-bottom: 1px solid var(--border);
        align-items: center; padding: 0 12px; gap: 8px;
      }
      #mobChipBar {
        display: flex !important;
        position: fixed; top: 50px; left: 0; right: 0; height: 42px; z-index: 600;
        background: var(--white); border-bottom: 1px solid var(--border);
        align-items: center;
      }
      #mobRecFloat {
        display: block !important;
        position: absolute; left: 12px; right: 12px; top: 56px; z-index: 100;
        background: rgba(255,255,255,.96); border-radius: 14px;
        border: 1px solid #C5DCFF; padding: 11px 13px;
        box-shadow: 0 2px 16px rgba(0,0,0,.08);
        transition: opacity .2s, transform .2s;
      }
      #mobRecFloat.hidden { opacity: 0; transform: translateY(-6px); pointer-events: none; }
      #mobPanelDim {
        display: none;
        position: fixed; inset: 0; z-index: 700; background: rgba(0,0,0,.28);
      }
      #mobPanelDim.on { display: block; }
      #mobPanel {
        display: flex !important;
        flex-direction: column;
        position: fixed; top: 0; right: 0; bottom: 0;
        width: min(330px, 88vw); z-index: 800;
        background: var(--white); box-shadow: -6px 0 32px rgba(0,0,0,.15);
        transform: translateX(100%);
        transition: transform .3s cubic-bezier(0.32,0.72,0,1);
      }
      #mobPanel.open { transform: translateX(0); }

      /* 드로어 */
      .drawer { left: 0 !important; max-height: 88vh !important; z-index: 900 !important; }
    }
    * { touch-action: manipulation; }
    button, a, [onclick] { -webkit-tap-highlight-color: transparent; }

    /* ── 모바일 컴포넌트 스타일 ── */
    .mob-logo { font-size: 15px; font-weight: 900; white-space: nowrap; color: var(--text-primary); }
    .mob-logo em { color: var(--blue); font-style: normal; }
    .mob-sw { flex:1; display:flex; gap:6px; min-width:0; }
    .mob-si {
      flex:1; height:34px; border:1.5px solid var(--border); border-radius:9px;
      padding:0 10px; font-family:'Noto Sans KR',sans-serif; font-size:13px;
      background:var(--bg); min-width:0; color:var(--text-primary);
    }
    .mob-si:focus { outline:none; border-color:var(--blue); }
    .mob-sb {
      height:34px; padding:0 11px; background:var(--blue); color:white;
      border:none; border-radius:9px; font-family:'Noto Sans KR',sans-serif;
      font-size:12px; font-weight:700; white-space:nowrap; flex-shrink:0; cursor:pointer;
    }
    .mob-pb {
      flex-shrink:0; display:flex; align-items:center; gap:4px;
      font-size:11px; font-weight:700; color:var(--text-secondary);
      background:var(--bg); border:1.5px solid var(--border);
      border-radius:999px; padding:4px 9px; white-space:nowrap;
      font-family:'Noto Sans KR',sans-serif; cursor:pointer;
    }
    .mob-pb.on { background:#FFF0F1; color:#F04452; border-color:#F04452; }
    .mob-ptrack { width:26px; height:15px; border-radius:999px; background:var(--border); position:relative; transition:background .2s; flex-shrink:0; }
    .mob-ptrack::after { content:''; position:absolute; top:2px; left:2px; width:11px; height:11px; border-radius:50%; background:white; transition:left .2s; box-shadow:0 1px 3px rgba(0,0,0,.2); }
    .mob-pb.on .mob-ptrack { background:#F04452; }
    .mob-pb.on .mob-ptrack::after { left:13px; }
    .mob-chips { flex:1; display:flex; gap:6px; overflow-x:auto; padding:0 10px; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
    .mob-chips::-webkit-scrollbar { display:none; }
    .mob-cpick { padding:4px 12px; border-radius:999px; white-space:nowrap; flex-shrink:0; background:var(--text-primary); color:white; border:none; font-size:12px; font-weight:700; font-family:'Noto Sans KR',sans-serif; cursor:pointer; }
    .mob-chip { padding:4px 12px; border-radius:999px; white-space:nowrap; flex-shrink:0; border:1.5px solid var(--border); background:var(--white); font-size:12px; font-weight:500; color:var(--text-secondary); font-family:'Noto Sans KR',sans-serif; cursor:pointer; }

<script>
const NHN_ADDR = "서울특별시 구로구 디지털로26길 72";

let CX = 37.4808, CY = 126.8937;

// ── Supabase 설정 ──
const SB_URL = "https://jioytxfvwibileewqkbz.supabase.co";
const SB_KEY = "sb_publishable_2YREMM4-rc3nmn9iNPjdSw_B8eep4k7";
const sbFetch = (path, opts={}) => fetch(`${SB_URL}/rest/v1/${path}`, {
  ...opts,
  headers: {
    "apikey": SB_KEY,
    "Authorization": `Bearer ${SB_KEY}`,
    "Content-Type": "application/json",
    "Prefer": opts.prefer || "",
    ...(opts.headers||{})
  }
});

// 페이코 데이터 (공유)
let uPayco = {};
async function loadPaycoFromDB() {
  try {
    const res = await sbFetch("payco?select=place_id,enabled");
    const data = await res.json();
    uPayco = {};
    data.forEach(r => { uPayco[r.place_id] = r.enabled; });
  } catch(e) { uPayco = {}; }
}
async function setPaycoDB(placeId, enabled) {
  await sbFetch("payco", {
    method: "POST",
    prefer: "resolution=merge-duplicates",
    headers: { "Prefer": "resolution=merge-duplicates" },
    body: JSON.stringify({ place_id: placeId, enabled })
  });
  uPayco[placeId] = enabled;
}

// 리뷰 데이터 (공유)
let uRevs = {};
async function loadReviewsFromDB() {
  try {
    const res = await sbFetch("reviews?select=*&order=created_at.asc");
    const data = await res.json();
    uRevs = {};
    data.forEach(r => {
      if (!uRevs[r.place_id]) uRevs[r.place_id] = [];
      uRevs[r.place_id].push({ id: r.id, author: r.author, star: r.star, text: r.text, date: r.date });
    });
  } catch(e) { uRevs = {}; }
}
async function addReviewToDB(placeId, placeName, author, star, text, date) {
  const res = await sbFetch("reviews", {
    method: "POST",
    prefer: "return=representation",
    headers: { "Prefer": "return=representation" },
    body: JSON.stringify({ place_id: placeId, place_name: placeName, author, star, text, date })
  });
  const data = await res.json();
  if (!uRevs[placeId]) uRevs[placeId] = [];
  const newRev = data[0] || { author, star, text, date };
  uRevs[placeId].push({ id: newRev.id, author, star, text, date });
}
async function deleteReviewFromDB(placeId, reviewId) {
  await sbFetch(`reviews?id=eq.${reviewId}`, { method: "DELETE" });
  if (uRevs[placeId]) {
    uRevs[placeId] = uRevs[placeId].filter(r => r.id !== reviewId);
  }
}

const isPayco = p => uPayco[p.id] === true;

let map,ps,ovs=[],places=[],filtered=[],sel=null,star=0,pOn=false,cat="FD6",kw=false,busy=false;

let lastCenter = null;

window.onload=function(){
  if(typeof kakao === 'undefined' || typeof kakao.maps === 'undefined') {
    setTimeout(window.onload, 200); return;
  }
  map=new kakao.maps.Map(document.getElementById("map"),{center:new kakao.maps.LatLng(CX,CY),level:4});
  ps=new kakao.maps.services.Places();

  lastCenter = new kakao.maps.LatLng(CX, CY);

  // DB에서 공유 데이터 먼저 로드
  Promise.all([loadPaycoFromDB(), loadReviewsFromDB()]).then(() => {
    load();
  });

  // 드래그하면 버튼 표시 + 드로어 닫기
  kakao.maps.event.addListener(map, 'dragstart', function() {
    document.getElementById("reSearchBtn").style.display = "block";
    closeDrawer();
  });

  // 지도 클릭 시 - 정확한 위치 클릭해야만 장소 정보 표시, 빈 곳은 드로어 닫기
  kakao.maps.event.addListener(map, 'click', function(mouseEvent) {
    const latlng = mouseEvent.latLng;
    const clickPs = new kakao.maps.services.Places();

    function findClosest(data) {
      let closest = null, minDist = Infinity;
      data.forEach(p => {
        const dx = parseFloat(p.x) - latlng.getLng();
        const dy = parseFloat(p.y) - latlng.getLat();
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < minDist) { minDist = d; closest = p; }
      });
      return minDist < 0.00015 ? closest : null; // 약 15m 이내만
    }

    clickPs.categorySearch('FD6', function(data1, status1) {
      const found1 = status1 === kakao.maps.services.Status.OK ? findClosest(data1) : null;
      clickPs.categorySearch('CE7', function(data2, status2) {
        const found2 = status2 === kakao.maps.services.Status.OK ? findClosest(data2) : null;
        const found = found1 || found2;
        if (found) {
          sel = found;
          openDrawer(found);
          map.panTo(new kakao.maps.LatLng(found.y, found.x));
        } else {
          closeDrawer();
        }
      }, { location: latlng, radius: 20, sort: kakao.maps.services.SortBy.DISTANCE });
    }, { location: latlng, radius: 20, sort: kakao.maps.services.SortBy.DISTANCE });
  });
};

      `점심은 하루의 반환점! 맛있게 먹고 오후도 달려봐요 🏃‍♀️💨`,
      `AI가 엄선한 오늘의 추천! 믿고 따라가요 😎🎯`,
      `배고플 땐 생각이 안 나잖아요. 일단 가요! 🚶‍♂️💨`,
    ];
    document.getElementById("recTitle").innerHTML =
      `오늘은 <em>'${picked.place_name}'</em> 어떠세요?`;

function autoNick() {
  return NICKNAMES[Math.floor(Math.random()*NICKNAMES.length)] + Math.floor(Math.random()*99+1);
}

function load(){
  if(busy)return;
  busy=true;spin(true);places=[];clearOv();
  const loc=new kakao.maps.LatLng(CX,CY);
  let pg=1;
  const MAX_PAGE=5; // 카카오 최대 45개 × 페이지네이션
  function next(){
    const opts={location:loc,radius:2000,sort:kakao.maps.services.SortBy.DISTANCE,page:pg,size:15};
    const cb=(data,status,pag)=>{
      if(status===kakao.maps.services.Status.OK){
        places=places.concat(data);
        if(pag.hasNextPage && pg < MAX_PAGE){ pg++; next(); }else done();
      }else done();
    };
    kw?ps.keywordSearch(cat+" 구로디지털단지",cb,opts):ps.categorySearch(cat,cb,opts);
  }
  next();
  function done(){
    const seen=new Set();
    places=places.filter(p=>{if(seen.has(p.id))return false;seen.add(p.id);return true;});
    busy=false;filter();spin(false);
    if(document.getElementById("recContent").style.display !== "block") {
      getRecommendation();
    }
  }
}

function svgIcon(type){
  if(type==='cafe') return `<svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M2 21h18v-2H2v2M20 8c.55 0 1-.45 1-1s-.45-1-1-1h-1V4H3v5c0 3.57 2.96 6.47 6.5 6.95V17H7v2h8v-2h-2.5v-1.05C16.04 15.47 19 12.57 19 9V6h1v2h1M5 9V6h12v3c0 2.76-2.24 5-5 5s-5-2.24-5-5z"/></svg>`;
  return `<svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/></svg>`;

function markerHtml(p, isSel){
  const pay=isPayco(p), cafe=p.category_name&&p.category_name.includes("카페");
  const bg = isSel ? "#1B64DA" : pay ? "#F04452" : cafe ? "#6D4C41" : "#3182F6";
  const zoom = map.getLevel();
  const name = p.place_name;
  const icon = svgIcon(cafe?'cafe':'food');

  if(zoom <= 3){
    // 이름 라벨
    const sel_style = isSel ? "transform:scale(1.12);box-shadow:0 3px 14px rgba(0,0,0,0.28);" : "";
    return `<div onclick="pick('${p.id}')" style="background:${bg};color:white;border-radius:999px;padding:5px 11px 5px 8px;font-size:11px;font-weight:700;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.2);letter-spacing:-0.2px;display:flex;align-items:center;gap:5px;${sel_style}">${icon}${name}</div>`;
  } else {
    // 핀 마커 (겹침 없음)
    const size = isSel ? "34px" : "28px";
    return `<div onclick="pick('${p.id}')" title="${name}" style="width:${size};height:${size};background:${bg};border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.25);border:2.5px solid white;"><span style="transform:rotate(45deg);display:flex;align-items:center;justify-content:center;">${icon}</span></div>`;
  }
}

function renderOv(){
  clearOv();
  // 선택된 항목은 맨 마지막에 그려서 위에 오게
  const sorted = [...filtered].sort((a,b)=>{
    const as = sel&&sel.id===a.id ? 1 : 0;
    const bs = sel&&sel.id===b.id ? 1 : 0;
    return as - bs;
  });
  sorted.forEach(p=>{
    const isSel = sel&&sel.id===p.id;
    const o=new kakao.maps.CustomOverlay({
      position:new kakao.maps.LatLng(p.y,p.x),
      content: markerHtml(p, isSel),
      yAnchor: map.getLevel()<=3 ? 1.5 : 1.1,
      zIndex: isSel ? 10 : 1
    });
    o.setMap(map);ovs.push(o);
  });
}

async function submitRv(pid){
  const name = autoNick();
  const text = document.getElementById("wText").value.trim();
  if(!text){alert("리뷰를 입력해주세요!");return;}
  if(!star){alert("별점을 선택해주세요!");return;}
  const now = new Date();
  const date = `${now.getMonth()+1}/${now.getDate()}`;
  const placeName = sel ? sel.place_name : "";
  const btn = document.querySelector(".w-submit");
  if(btn){ btn.textContent = "저장 중..."; btn.disabled = true; }
  await addReviewToDB(pid, placeName, name, star, text, date);
  // 내 닉네임 세션에 저장 (삭제 버튼 표시용)
  const myNicks = JSON.parse(sessionStorage.getItem('myNicks')||'[]');
  if(!myNicks.includes(name)) myNicks.push(name);
  sessionStorage.setItem('myNicks', JSON.stringify(myNicks));
  const p = filtered.find(x=>x.id===pid);
  if(p) openDrawer(p);
  renderCards();
}

}

    });
    var data = await res.json();
    var json = JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());
    reason = json.reason;
  } catch(e){}

  var tis = ['mobRTi','mobPRTi'];
  var res2 = ['mobRRe','mobPRRe'];
  tis.forEach(function(id){ var el=document.getElementById(id); if(el) el.innerHTML=title; });
  res2.forEach(function(id){ var el=document.getElementById(id); if(el) el.textContent=reason; });
  loads.forEach(function(id){ var el=document.getElementById(id); if(el) el.style.display='none'; });
  conts.forEach(function(id){ var el=document.getElementById(id); if(el) el.style.display='block'; });
}

// 지도 로드 후 모바일 추천 실행
var _mobTimer = setInterval(function(){
  if(places.length > 0){
    clearInterval(_mobTimer);
    if(window.matchMedia('(max-width:768px)').matches) mobGetRec();
  }
}, 600);
</script>
