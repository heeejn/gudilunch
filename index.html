<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>구디밥 — 구로디지털단지 맛집 & 카페</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=e6a5066c0e33bfb365feae38e3ef31f4&libraries=services"></script>
  <style>
    :root {
      --bg: #0e0e0e;
      --surface: #181818;
      --surface2: #222222;
      --border: #2e2e2e;
      --accent: #f5c842;
      --text: #f0ede8;
      --text-muted: #888;
      --payco: #ef1c24;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow: hidden; }

    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      background: rgba(14,14,14,0.97); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 56px;
    }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: var(--accent); }
    .logo span { color: var(--text-muted); font-size: 12px; font-family: 'Noto Sans KR', sans-serif; letter-spacing: 0; margin-left: 8px; font-weight: 300; }

    .payco-toggle {
      display: flex; align-items: center; gap: 7px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 999px; padding: 5px 14px 5px 8px;
      cursor: pointer; transition: all 0.2s; user-select: none;
    }
    .payco-toggle:hover { border-color: var(--payco); }
    .payco-toggle.active { border-color: var(--payco); background: rgba(239,28,36,0.1); }
    .toggle-dot { width: 30px; height: 17px; background: var(--border); border-radius: 999px; position: relative; transition: background 0.2s; flex-shrink: 0; }
    .toggle-dot::after { content: ''; position: absolute; width: 11px; height: 11px; background: #fff; border-radius: 50%; top: 3px; left: 3px; transition: left 0.2s; }
    .payco-toggle.active .toggle-dot { background: var(--payco); }
    .payco-toggle.active .toggle-dot::after { left: 16px; }
    .payco-badge { background: var(--payco); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; }
    .payco-label { font-size: 12px; font-weight: 500; }

    .main-layout { display: grid; grid-template-columns: 400px 1fr; height: 100vh; padding-top: 56px; }

    .left-panel { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }

    .panel-top { padding: 12px 14px 10px; border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }

    .search-bar { display: flex; gap: 8px; margin-bottom: 10px; }
    .search-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 13px; padding: 8px 12px; outline: none; transition: border 0.15s; }
    .search-input:focus { border-color: var(--accent); }
    .search-btn { background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 0 16px; font-size: 13px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: opacity 0.15s; }
    .search-btn:hover { opacity: 0.85; }

    .category-filter { display: flex; gap: 5px; flex-wrap: wrap; }
    .cat-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); border-radius: 999px; padding: 4px 11px; font-size: 11px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .cat-btn:hover { border-color: var(--accent); color: var(--accent); }
    .cat-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

    .result-info { padding: 7px 14px; font-size: 11px; color: var(--text-muted); border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; }
    .result-info strong { color: var(--accent); }
    .loading-spinner { display: none; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); }
    .loading-spinner.show { display: flex; }
    .spinner { width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .restaurant-list { flex: 1; overflow-y: auto; padding: 6px 10px 20px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

    .restaurant-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 13px; margin-bottom: 6px; cursor: pointer; transition: all 0.15s; }
    .restaurant-card:hover { border-color: var(--accent); transform: translateY(-1px); }
    .restaurant-card.active { border-color: var(--accent); background: var(--surface2); }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
    .card-name { font-size: 14px; font-weight: 700; }
    .card-cat { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .card-rating { font-size: 12px; font-weight: 700; color: var(--accent); white-space: nowrap; }

    .card-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-bottom: 4px; }
    .card-distance { font-size: 11px; color: var(--text-muted); background: var(--surface2); padding: 2px 7px; border-radius: 999px; }
    .payco-chip { background: rgba(239,28,36,0.15); border: 1px solid rgba(239,28,36,0.3); color: var(--payco); font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 4px; }
    .card-addr { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-review-preview { margin-top: 5px; font-size: 11px; color: var(--text-muted); font-style: italic; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; }

    #map { width: 100%; height: 100%; }

    .detail-drawer {
      position: fixed; bottom: 0; left: 400px; right: 0;
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 14px 20px 20px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      z-index: 150; max-height: 55vh; overflow-y: auto;
    }
    .detail-drawer.open { transform: translateY(0); }

    .drawer-handle { width: 36px; height: 3px; background: var(--border); border-radius: 2px; margin: 0 auto 12px; }
    .drawer-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .drawer-name { font-size: 19px; font-weight: 900; line-height: 1.2; }
    .drawer-close { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
    .drawer-close:hover { border-color: var(--accent); color: var(--accent); }

    .drawer-info-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
    .drawer-rating-big { font-size: 22px; font-weight: 900; color: var(--accent); }
    .drawer-rating-big span { font-size: 12px; color: var(--text-muted); font-weight: 400; }
    .info-pill { background: var(--bg); border: 1px solid var(--border); padding: 5px 11px; border-radius: 8px; font-size: 12px; }
    .info-pill label { color: var(--text-muted); font-size: 10px; display: block; margin-bottom: 1px; }

    .naver-btn { display: inline-flex; align-items: center; gap: 5px; background: #03C75A; color: #fff; border: none; border-radius: 8px; padding: 6px 13px; font-size: 12px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; text-decoration: none; margin-bottom: 12px; }

    .section-title { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }

    .review-item { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 5px; }
    .review-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .review-author { font-size: 12px; font-weight: 700; }
    .review-date { font-size: 10px; color: var(--text-muted); }
    .review-text { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

    .write-review { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-top: 10px; }
    .write-review-title { font-size: 12px; font-weight: 700; margin-bottom: 8px; color: var(--accent); }
    .review-input-row { display: flex; gap: 6px; margin-bottom: 6px; }
    .review-input-row input, .review-textarea { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 12px; padding: 7px 10px; outline: none; transition: border 0.15s; }
    .review-input-row input:focus, .review-textarea:focus { border-color: var(--accent); }
    .review-input-row input { flex: 1; }
    .review-textarea { width: 100%; height: 60px; resize: none; display: block; margin-bottom: 6px; }
    .review-submit { background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 7px 18px; font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
    .review-submit:hover { opacity: 0.85; }

    .star-select { display: flex; gap: 3px; margin-bottom: 6px; }
    .star-select span { font-size: 18px; cursor: pointer; color: var(--border); transition: color 0.1s; }
    .star-select span.on { color: var(--accent); }

    .empty-state { text-align: center; padding: 50px 20px; color: var(--text-muted); }
    .empty-state .icon { font-size: 36px; margin-bottom: 10px; }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    @media (max-width: 768px) {
      .main-layout { grid-template-columns: 1fr; grid-template-rows: 45vh 1fr; }
      .detail-drawer { left: 0; max-height: 70vh; }
    }
  </style>
</head>
<body>

<header>
  <span class="logo">구디밥 <span>구로디지털단지 맛집 & 카페</span></span>
  <label class="payco-toggle" id="paycoToggle">
    <div class="toggle-dot"></div>
    <span class="payco-badge">PAYCO</span>
    <span class="payco-label">식권만 보기</span>
  </label>
</header>

<div class="main-layout">
  <div class="left-panel">
    <div class="panel-top">
      <div class="search-bar">
        <input class="search-input" id="searchInput" type="text" placeholder="음식 종류 또는 가게명 검색..." />
        <button class="search-btn" onclick="doSearch()">검색</button>
      </div>
      <div class="category-filter">
        <button class="cat-btn active" data-cat="FD6" data-label="음식점">🍽 전체 음식점</button>
        <button class="cat-btn" data-cat="CE7" data-label="카페">☕ 카페</button>
        <button class="cat-btn" data-cat="한식" data-label="한식" data-keyword="true">🍚 한식</button>
        <button class="cat-btn" data-cat="일식" data-label="일식" data-keyword="true">🍱 일식</button>
        <button class="cat-btn" data-cat="중식" data-label="중식" data-keyword="true">🥢 중식</button>
        <button class="cat-btn" data-cat="양식" data-label="양식" data-keyword="true">🍝 양식</button>
        <button class="cat-btn" data-cat="분식" data-label="분식" data-keyword="true">🍜 분식</button>
      </div>
    </div>
    <div class="result-info">
      <span id="resultCount">로딩 중...</span>
      <div class="loading-spinner" id="loadingSpinner">
        <div class="spinner"></div><span>불러오는 중</span>
      </div>
    </div>
    <div class="restaurant-list" id="restaurantList"></div>
  </div>

  <div style="position:relative;overflow:hidden;">
    <div id="map"></div>
    <div class="detail-drawer" id="detailDrawer">
      <div class="drawer-handle"></div>
      <div id="drawerContent"></div>
    </div>
  </div>
</div>

<script>
// ── PAYCO 가맹점 브랜드 목록 ──
const PAYCO_BRANDS = [
  "GS25","CU","세븐일레븐","이마트24","미니스톱",
  "롯데리아","맥도날드","버거킹","KFC","맘스터치","노브랜드버거","쉐이크쉑","파이브가이즈",
  "스타벅스","투썸플레이스","이디야","빽다방","메가MGC","컴포즈","더벤티","할리스","탐앤탐스","폴바셋","커피빈","엔제리너스",
  "한솥","본죽","본도시락","김가네","하남돼지집","원할머니보쌈","놀부부대찌개",
  "엽기떡볶이","명랑핫도그","홍콩반점","청년다당","두끼","떡볶이의신",
  "파리바게뜨","뚜레쥬르","던킨","베스킨라빈스","크리스피크림",
  "빕스","계절밥상","제일제면소","더플레이스",
  "굽네치킨","BBQ","BHC","교촌","네네치킨","60계치킨","푸라닭",
  "피자헛","도미노피자","파파존스",
  "서브웨이","써브웨이",
  "CJ푸드빌","아웃백","TGI","매드포갈릭"
];

function isPayco(name) {
  return PAYCO_BRANDS.some(b => name.includes(b));
}

// ── STATE ──
const CENTER_LAT = 37.4853;
const CENTER_LNG = 126.9019;
let map, ps;
let allPlaces = [];
let filteredPlaces = [];
let overlays = [];
let selectedPlace = null;
let selectedStar = 0;
let paycoOnly = false;
let currentCat = "FD6";
let currentLabel = "음식점";
let isKeywordCat = false;
let isLoading = false;

const STORAGE_KEY = "gudibap_reviews_v3";
function loadReviews() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch { return {}; } }
function saveReviews(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} }
let allReviews = loadReviews();

// ── MAP INIT ──
function initMap() {
  map = new kakao.maps.Map(document.getElementById("map"), {
    center: new kakao.maps.LatLng(CENTER_LAT, CENTER_LNG),
    level: 4
  });
  ps = new kakao.maps.services.Places();

  // 역 마커
  new kakao.maps.CustomOverlay({
    position: new kakao.maps.LatLng(CENTER_LAT, CENTER_LNG),
    content: `<div style="background:#f5c842;color:#000;font-size:11px;font-weight:900;padding:4px 10px;border-radius:20px;border:2px solid #c8a000;box-shadow:0 2px 8px rgba(0,0,0,0.5);white-space:nowrap;pointer-events:none;">🚇 구로디지털단지역</div>`,
    yAnchor: 1.3,
    zIndex: 10
  }).setMap(map);

  loadPlaces();
}

// ── LOAD ──
function loadPlaces() {
  if (isLoading) return;
  isLoading = true;
  showLoading(true);
  allPlaces = [];
  clearOverlays();

  if (!isKeywordCat) {
    // FD6(음식점) or CE7(카페) — 카테고리 검색, 최대 15페이지
    let page = 1;
    function nextPage() {
      ps.categorySearch(currentCat, (data, status, pagination) => {
        if (status === kakao.maps.services.Status.OK) {
          allPlaces = allPlaces.concat(data);
          if (pagination.hasNextPage && page < 15) {
            page++;
            pagination.nextPage();
          } else {
            done();
          }
        } else { done(); }
      }, { location: new kakao.maps.LatLng(CENTER_LAT, CENTER_LNG), radius: 1000, sort: kakao.maps.services.SortBy.DISTANCE, page });
    }
    nextPage();
  } else {
    // 한식/일식 등 — 키워드 검색
    let page = 1;
    function nextPage() {
      ps.keywordSearch(currentLabel + " 구로디지털단지", (data, status, pagination) => {
        if (status === kakao.maps.services.Status.OK) {
          allPlaces = allPlaces.concat(data);
          if (pagination.hasNextPage && page < 10) {
            page++;
            pagination.nextPage();
          } else { done(); }
        } else { done(); }
      }, { location: new kakao.maps.LatLng(CENTER_LAT, CENTER_LNG), radius: 1000, sort: kakao.maps.services.SortBy.DISTANCE, page });
    }
    nextPage();
  }

  function done() {
    // 중복 제거
    const seen = new Set();
    allPlaces = allPlaces.filter(p => { if (seen.has(p.id)) return false; seen.add(p.id); return true; });
    isLoading = false;
    applyFilter();
    showLoading(false);
  }
}

// ── FILTER ──
function applyFilter() {
  filteredPlaces = allPlaces.filter(p => !paycoOnly || isPayco(p.place_name));
  renderList();
  renderOverlays();
  document.getElementById("resultCount").innerHTML = `<strong>${filteredPlaces.length}</strong>개${paycoOnly ? ' · PAYCO 가맹점만' : ''}`;
}

function showLoading(v) { document.getElementById("loadingSpinner").classList.toggle("show", v); }

// ── RENDER LIST ──
function renderList() {
  const c = document.getElementById("restaurantList");
  if (!filteredPlaces.length) {
    c.innerHTML = `<div class="empty-state"><div class="icon">🍽️</div><p>조건에 맞는 장소가 없어요</p></div>`;
    return;
  }
  c.innerHTML = filteredPlaces.map(p => {
    const payco = isPayco(p.place_name);
    const revs = allReviews[p.id] || [];
    const avg = revs.length ? (revs.reduce((s,r)=>s+r.star,0)/revs.length).toFixed(1) : null;
    const lastRev = revs.length ? revs[revs.length-1].text : "";
    const catName = p.category_name ? p.category_name.split(">").pop().trim() : "";
    const dist = p.distance ? `${p.distance}m` : "";
    const active = selectedPlace && selectedPlace.id === p.id ? "active" : "";
    return `<div class="restaurant-card ${active}" onclick="selectPlace('${p.id}')" id="card-${p.id}">
      <div class="card-top">
        <div style="flex:1;min-width:0;"><div class="card-name">${p.place_name}</div><div class="card-cat">${catName}</div></div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;margin-left:8px;">
          ${avg ? `<div class="card-rating">★ ${avg}</div>` : ""}
          ${payco ? `<span class="payco-chip">PAYCO</span>` : ""}
        </div>
      </div>
      <div class="card-meta">${dist ? `<span class="card-distance">📍 ${dist}</span>` : ""}</div>
      <div class="card-addr">${p.road_address_name || p.address_name || ""}</div>
      ${lastRev ? `<div class="card-review-preview">"${lastRev}"</div>` : ""}
    </div>`;
  }).join("");
}

// ── OVERLAYS ──
function clearOverlays() { overlays.forEach(o => o.setMap(null)); overlays = []; }

function renderOverlays() {
  clearOverlays();
  filteredPlaces.forEach(p => {
    const payco = isPayco(p.place_name);
    const isCafe = p.category_name && p.category_name.includes("카페");
    const bg = payco ? "#ef1c24" : isCafe ? "#5C3A1E" : "#1e1e1e";
    const border = payco ? "#bf0e14" : isCafe ? "#8B6040" : "#3a3a3a";
    const icon = isCafe ? "☕" : "🍽";
    const o = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(p.y, p.x),
      content: `<div onclick="selectPlace('${p.id}')" style="background:${bg};color:#f0ede8;border:1.5px solid ${border};border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,0.5);">${icon} ${p.place_name}</div>`,
      yAnchor: 1.2
    });
    o.setMap(map);
    overlays.push(o);
  });
}

// ── SELECT ──
function selectPlace(id) {
  const p = filteredPlaces.find(x => x.id === id);
  if (!p) return;
  selectedPlace = p;
  document.querySelectorAll(".restaurant-card").forEach(c => c.classList.remove("active"));
  const card = document.getElementById(`card-${id}`);
  if (card) { card.classList.add("active"); card.scrollIntoView({ behavior:"smooth", block:"nearest" }); }
  map.panTo(new kakao.maps.LatLng(p.y, p.x));
  openDrawer(p);
}

// ── DRAWER ──
function openDrawer(p) {
  selectedStar = 0;
  const payco = isPayco(p.place_name);
  const catName = p.category_name ? p.category_name.split(">").pop().trim() : "";
  const revs = allReviews[p.id] || [];
  const avg = revs.length ? (revs.reduce((s,r)=>s+r.star,0)/revs.length).toFixed(1) : null;
  const dist = p.distance ? `${p.distance}m` : "-";
  const addr = p.road_address_name || p.address_name || "";

  const revsHtml = revs.map(rv => `
    <div class="review-item">
      <div class="review-top">
        <span class="review-author">👤 ${rv.author} ${"★".repeat(rv.star)}${"☆".repeat(5-rv.star)}</span>
        <span class="review-date">${rv.date}</span>
      </div>
      <div class="review-text">${rv.text}</div>
    </div>`).join("");

  document.getElementById("drawerContent").innerHTML = `
    <div class="drawer-header">
      <div style="flex:1;min-width:0;">
        <div class="drawer-name">${p.place_name} ${payco ? `<span class="payco-chip" style="font-size:11px;vertical-align:middle;">PAYCO</span>` : ""}</div>
        <div style="color:var(--text-muted);font-size:12px;margin-top:3px;">${catName}${addr ? " · " + addr : ""}</div>
      </div>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-info-row">
      ${avg ? `<div class="drawer-rating-big">★${avg} <span>/ 5.0 (${revs.length}건)</span></div>` : `<div style="color:var(--text-muted);font-size:12px;">아직 리뷰가 없어요</div>`}
      <div class="info-pill"><label>거리</label>${dist}</div>
      ${p.phone ? `<div class="info-pill"><label>전화</label>${p.phone}</div>` : ""}
    </div>
    <a class="naver-btn" href="https://map.naver.com/v5/search/${encodeURIComponent(p.place_name)}" target="_blank">🗺 네이버 지도에서 보기</a>
    <div class="section-title">커뮤니티 리뷰 (${revs.length})</div>
    <div id="revList">${revsHtml || `<div style="color:var(--text-muted);font-size:12px;padding:4px 0 8px;">첫 리뷰를 남겨보세요!</div>`}</div>
    <div class="write-review">
      <div class="write-review-title">✍️ 리뷰 남기기</div>
      <div class="review-input-row"><input type="text" id="reviewAuthor" placeholder="닉네임" maxlength="10" /></div>
      <div class="star-select" id="starSelect">
        <span onclick="setStar(1)">★</span><span onclick="setStar(2)">★</span><span onclick="setStar(3)">★</span><span onclick="setStar(4)">★</span><span onclick="setStar(5)">★</span>
      </div>
      <textarea class="review-textarea" id="reviewText" placeholder="솔직한 한마디! (최대 200자)" maxlength="200"></textarea>
      <button class="review-submit" onclick="submitReview('${p.id}')">등록하기</button>
    </div>`;

  document.getElementById("detailDrawer").classList.add("open");
}

function closeDrawer() {
  document.getElementById("detailDrawer").classList.remove("open");
  selectedPlace = null;
  document.querySelectorAll(".restaurant-card").forEach(c => c.classList.remove("active"));
}

function setStar(n) {
  selectedStar = n;
  document.querySelectorAll("#starSelect span").forEach((s,i) => s.classList.toggle("on", i < n));
}

function submitReview(pid) {
  const author = document.getElementById("reviewAuthor").value.trim() || "익명";
  const text = document.getElementById("reviewText").value.trim();
  if (!text) { alert("리뷰 내용을 입력해주세요!"); return; }
  if (!selectedStar) { alert("별점을 선택해주세요!"); return; }
  if (!allReviews[pid]) allReviews[pid] = [];
  const now = new Date();
  allReviews[pid].push({ author, star: selectedStar, text, date: `${now.getMonth()+1}/${now.getDate()}` });
  saveReviews(allReviews);
  const p = filteredPlaces.find(x => x.id === pid);
  if (p) openDrawer(p);
  renderList();
}

// ── SEARCH ──
function doSearch() {
  const q = document.getElementById("searchInput").value.trim();
  if (!q) { loadPlaces(); return; }
  if (isLoading) return;
  isLoading = true;
  showLoading(true);
  allPlaces = [];
  clearOverlays();
  let page = 1;
  function next() {
    ps.keywordSearch(q, (data, status, pagination) => {
      if (status === kakao.maps.services.Status.OK) {
        allPlaces = allPlaces.concat(data);
        if (pagination.hasNextPage && page < 5) { page++; pagination.nextPage(); }
        else { isLoading = false; applyFilter(); showLoading(false); }
      } else { isLoading = false; applyFilter(); showLoading(false); }
    }, { location: new kakao.maps.LatLng(CENTER_LAT, CENTER_LNG), radius: 1000, sort: kakao.maps.services.SortBy.DISTANCE, page });
  }
  next();
}

document.getElementById("searchInput").addEventListener("keydown", e => { if (e.key === "Enter") doSearch(); });

document.getElementById("paycoToggle").addEventListener("click", function() {
  paycoOnly = !paycoOnly;
  this.classList.toggle("active", paycoOnly);
  applyFilter();
  closeDrawer();
});

document.querySelectorAll(".cat-btn").forEach(btn => {
  btn.addEventListener("click", function() {
    if (isLoading) return;
    document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
    this.classList.add("active");
    currentCat = this.dataset.cat;
    currentLabel = this.dataset.label;
    isKeywordCat = !!this.dataset.keyword;
    document.getElementById("searchInput").value = "";
    closeDrawer();
    loadPlaces();
  });
});

window.onload = initMap;
</script>
</body>
</html>
